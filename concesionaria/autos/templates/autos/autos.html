{% extends "autos/base.html" %}

{% block title %}Autos{% endblock %}

{% block body %}

    <h1>Autos</h1>
    <p>Lista de autos disponibles:</p>
    <ul>
        {% for auto in autos %}
            <li>Modelo: {{ auto.marca }} - {{ auto.modelo }}</li>
            <li>Precio: {{ auto.precio }}</li>
            <li>Año: {{ auto.anio }}</li>
            <hr> <!-- Separador entre autos -->
        {% endfor %}
    </ul>
{% endblock %}
